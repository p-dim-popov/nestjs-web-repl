name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22.x', '24.x']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Test
        run: npm test

  release-config:
    name: validate release config
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Load & validate semantic-release config
        # Loads .releaserc.json and requires every plugin during setup, then
        # no-ops because the PR branch is not `main`. A malformed config or a
        # missing plugin fails here; a clean exit proves the pipeline is valid.
        # No tokens: verifyConditions (which needs auth) only runs for the
        # release branch, which this is not.
        run: npx semantic-release --dry-run --no-ci
